<title>PAC Pack Checklist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');
  :root { --navy:#1B3172; --sky:#29ABE2; --yellow:#F5C518; --light:#F4F7FB; --border:#D0DCF0; --text:#1a1a2e; --muted:#6b7a99; --green:#2ecc71; --row-alt:#f0f5fb; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--light); color:var(--text); min-height:100vh; }

  @media screen {
    #tab-bar { scrollbar-width:none; }
    #tab-bar::-webkit-scrollbar { display:none; }
    .tab-item { display:flex; align-items:center; gap:6px; padding:8px 14px 9px; background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); border-radius:8px 8px 0 0; cursor:pointer; font-size:12px; font-weight:600; white-space:nowrap; border:1px solid rgba(255,255,255,0.1); border-bottom:none; transition:all 0.15s; margin-top:6px; user-select:none; }
    .tab-item:hover { background:rgba(255,255,255,0.14); color:white; }
    .tab-item.active { background:var(--light); color:var(--navy); border-color:transparent; }
    .tab-item .tab-close { font-size:14px; line-height:1; opacity:0.5; padding:0 2px; }
    .tab-item .tab-close:hover { opacity:1; color:#e74c3c; }
    .tab-add { padding:8px 12px 9px; background:transparent; color:rgba(255,255,255,0.5); border:none; font-size:20px; cursor:pointer; margin-top:6px; line-height:1; }
    .tab-add:hover { color:white; }
    .tab-dot { width:7px; height:7px; border-radius:50%; background:var(--green); flex-shrink:0; }
    .tab-dot.empty { background:rgba(255,255,255,0.25); }
    .tab-dot.overpacked { background:#e74c3c; }
  }
    .screen-header { background:var(--navy); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .logo-area { display:flex; align-items:center; gap:12px; }
    .logo-box { background:var(--sky); color:white; font-weight:700; font-size:13px; letter-spacing:1.5px; padding:6px 10px; border-radius:4px; }
    .logo-title { color:white; font-size:15px; font-weight:600; }
    .logo-sub { color:var(--sky); font-size:11px; font-weight:500; letter-spacing:0.5px; text-transform:uppercase; }
    .header-right { display:flex; align-items:center; gap:12px; }
    .mode-toggle { display:flex; border-radius:8px; overflow:hidden; border:2px solid rgba(255,255,255,0.2); }
    .mode-btn { padding:8px 18px; font-size:13px; font-weight:700; cursor:pointer; border:none; background:transparent; color:rgba(255,255,255,0.6); transition:all 0.2s; }
    .mode-btn.active { background:var(--yellow); color:var(--navy); }
    .save-btn { background:var(--yellow); color:var(--navy); border:none; padding:10px 20px; border-radius:6px; font-weight:700; font-size:13px; cursor:pointer; }
    .save-btn:hover { opacity:0.85; }
    .clear-btn { background:#e74c3c; color:white; border:none; padding:10px 18px; border-radius:6px; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s; letter-spacing:0.3px; box-shadow:0 2px 8px rgba(231,76,60,0.5); }
    .clear-btn:hover { background:#c0392b; box-shadow:0 2px 12px rgba(231,76,60,0.7); }
    .container { max-width:1200px; margin:24px auto; padding:0 16px 40px; }
    .card { background:white; border-radius:10px; border:1px solid var(--border); overflow:hidden; margin-bottom:20px; }
    .card-header { background:var(--navy); color:white; padding:14px 20px; font-weight:600; font-size:13px; letter-spacing:0.5px; text-transform:uppercase; }
    .group-bar { display:flex; align-items:center; gap:12px; padding:14px 18px; flex-wrap:wrap; }
    .group-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap; }
    .group-select { flex:1; min-width:200px; border:2px solid var(--border); border-radius:6px; padding:8px 12px; font-size:14px; font-weight:500; color:var(--text); background:white; outline:none; cursor:pointer; }
    .group-select:focus { border-color:var(--sky); }
    .load-btn { background:var(--sky); color:white; border:none; padding:9px 18px; border-radius:6px; font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap; }
    .load-btn:hover { opacity:0.85; }
    .load-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .status-msg { font-size:12px; color:var(--muted); padding:0 18px 12px; min-height:20px; }
    .status-msg.error { color:#e74c3c; }
    .status-msg.success { color:var(--green); }
    .fields-grid { display:grid; grid-template-columns:1fr 1fr 1fr; }
    .field-group { padding:14px 18px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
    .field-group:nth-child(3n) { border-right:none; }
    .field-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
    .field-input { width:100%; border:none; border-bottom:2px solid var(--border); padding:4px 0; font-size:14px; font-family:'Roboto Mono',monospace; font-weight:500; color:var(--text); background:transparent; outline:none; transition:border-color 0.15s; }
    .field-input:focus { border-bottom-color:var(--sky); }
    .table-scroll { overflow-x:auto; }
    thead th { background:var(--navy); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead tr { background:var(--navy); color:white; }
    thead th { padding:8px 10px; text-align:left; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap; vertical-align:top; background:var(--navy); }
    thead th.center { text-align:center; }
    tbody tr { border-bottom:1px solid var(--border); }
    tbody tr:nth-child(even) { background:var(--row-alt); }
    tbody tr:hover { background:#e8f0fb; }
    tbody tr.done-row { background:#e8f8f0 !important; }
    tbody tr.overpacked-row { background:#fdecea !important; }
    tbody tr.overpacked-row td { color:#c0392b; }
    tbody td { padding:7px 10px; vertical-align:middle; }
    tbody td.center { text-align:center; vertical-align:middle; }
    .td-input { width:100%; border:none; background:transparent; font-size:13px; color:var(--text); outline:none; padding:2px 0; }
    .td-input:focus { border-bottom:1.5px solid var(--sky); }
    .num-input { width:48px; border:none; background:transparent; font-family:'Roboto Mono',monospace; font-size:13px; font-weight:500; color:var(--text); outline:none; text-align:center; }
    .num-input:focus { border-bottom:1.5px solid var(--sky); }
    .check-cell { display:flex; justify-content:center; align-items:center; }
    .check-box { width:20px; height:20px; border:2px solid var(--border); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .check-box.checked { background:var(--green); border-color:var(--green); }
    .check-box.checked::after { content:'✓'; color:white; font-size:12px; font-weight:700; }
    /* TALLY */
    .tally-cell { display:flex; align-items:center; gap:4px; justify-content:center; }
    .tally-marks { font-size:14px; min-width:38px; text-align:center; line-height:1; color:var(--navy); font-family:'Roboto Mono',monospace; }
    .tally-count { font-size:10px; color:var(--muted); font-weight:600; text-align:center; }
    .tally-btn { width:22px; height:22px; border-radius:50%; border:none; cursor:pointer; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .tally-plus { background:var(--sky); color:white; }
    .tally-plus:hover { background:var(--navy); }
    .tally-minus { background:#eee; color:var(--muted); }
    .tally-minus:hover { background:#ddd; }
    /* PLT header */
    .plt-label { background:rgba(255,255,255,0.15); border-radius:4px; padding:3px 6px; font-size:11px; font-weight:700; letter-spacing:0.5px; text-align:center; margin-bottom:4px; }
    /* PLT footer rows */
    .plt-footer { background:#1a2d65; }
    .plt-footer td { padding:6px 10px; font-size:11px; }
    .plt-footer-label { color:var(--sky); font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
    .plt-tare-input { width:70px; border:none; border-bottom:1.5px solid rgba(255,255,255,0.3); background:transparent; color:white; font-family:'Roboto Mono',monospace; font-size:12px; font-weight:600; text-align:center; outline:none; padding:2px 4px; }
    .plt-tare-input::placeholder { color:rgba(255,255,255,0.3); }
    .plt-total-val { color:var(--yellow); font-family:'Roboto Mono',monospace; font-weight:700; font-size:13px; text-align:center; }
    /* Add/remove PLT */
    .plt-actions { display:flex; gap:8px; padding:10px 18px 0; justify-content:flex-end; }
    .add-plt-btn { background:transparent; border:2px solid var(--sky); color:var(--sky); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.15s; }
    .add-plt-btn:hover { background:var(--sky); color:white; }
    .rem-plt-btn { background:transparent; border:2px solid #e74c3c; color:#e74c3c; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.15s; }
    .rem-plt-btn:hover { background:#e74c3c; color:white; }
    .add-row-btn { margin:12px 18px; background:transparent; border:2px dashed var(--border); color:var(--muted); padding:8px 18px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:all 0.15s; width:calc(100% - 36px); }
    .add-row-btn:hover { border-color:var(--sky); color:var(--sky); }
    .totals-bar { display:flex; gap:24px; padding:14px 20px; background:var(--navy); color:white; align-items:center; flex-wrap:wrap; }
    .total-item { display:flex; gap:8px; align-items:center; }
    .total-label { color:var(--sky); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
    .total-value { font-family:'Roboto Mono',monospace; font-weight:700; font-size:16px; }
    .progress-bar-wrap { flex:1; min-width:120px; }
    .progress-bar-bg { background:rgba(255,255,255,0.2); border-radius:99px; height:6px; overflow:hidden; }
    .progress-bar-fill { background:#e74c3c; height:100%; border-radius:99px; transition:width 0.3s, background 0.4s; }
    .progress-label { font-size:11px; color:var(--sky); margin-bottom:4px; font-weight:600; text-transform:uppercase; }
    .notes-area { width:100%; border:none; padding:14px 18px; font-size:13px; color:var(--text); resize:vertical; min-height:70px; outline:none; background:white; overflow:hidden; font-family:'Inter',sans-serif; line-height:1.5; }
    .print-tip { text-align:center; color:var(--muted); font-size:12px; margin-top:8px; }
    .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
    .empty-state .icon { font-size:32px; margin-bottom:10px; }
  }

  @page { size: landscape; margin: 10mm; }

  @media print {
    body { background:white; font-size:10px; }
    .screen-header,.save-btn,.add-row-btn,.plt-actions,.print-tip,.group-bar,.status-msg,.tally-btn { display:none !important; }
    #tab-bar { display:none !important; }
    [id^="sort-arrow-"] { display:none !important; }
    thead th { cursor:default !important; }
    .container { max-width:100%; padding:0; margin:0; }
    .print-header { display:flex !important; align-items:center; justify-content:space-between; border-bottom:3px solid #1B3172; padding-bottom:10px; margin-bottom:14px; }
    .print-logo { font-size:20px; font-weight:800; color:#1B3172; }
    .print-logo span { color:#29ABE2; }
    .print-title { font-size:12px; font-weight:700; color:#1B3172; text-align:right; }
    .print-subtitle { font-size:10px; color:#6b7a99; }
    .card { border:1px solid #ccc; margin-bottom:10px; border-radius:4px; overflow:hidden; }
    .card-header { background:#1B3172 !important; color:white !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; padding:5px 10px; font-size:9px; font-weight:700; text-transform:uppercase; }
    .fields-grid { display:grid; grid-template-columns:1fr 1fr 1fr; }
    .field-group { padding:7px 10px; border-right:1px solid #ccc; border-bottom:1px solid #ccc; }
    .field-label { font-size:8px; font-weight:700; color:#6b7a99; text-transform:uppercase; margin-bottom:2px; }
    .field-input { font-size:11px; font-weight:600; border:none; border-bottom:1px solid #ccc; width:100%; padding:2px 0; }
    table { width:100%; border-collapse:collapse; font-size:9px; table-layout:auto; }
    .table-scroll { overflow:visible !important; }
    .container { max-width:100%; padding:0; margin:0; }
    @page { size: landscape; margin: 5mm; }
    /* Base print: shrink PLT columns from 140px */
    thead th[id^="plt-th-"] { width:100px !important; }
    thead th { min-width:0 !important; }
    thead { display:table-header-group !important; }
    thead tr { background:#1B3172 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; break-inside:avoid; break-after:avoid; page-break-after:avoid; }

<script>
const API_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY1NTA2MjcxMCwiYWFpIjoxMSwidWlkIjo0Mjk5NTY4OSwiaWFkIjoiMjAyNi0wNS0wN1QwMzozMDo0Ny4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MTY2NzY4OTQsInJnbiI6InVzZTEifQ.Aju0mNGNOKtHfSNkYp_uL4_zVuHMXVIZ6JHdWClEwPQ';
const BOARD_ID = '6964153366';
let rowCount = 0;
let tallyData = {};   // key: "rid-pltN" (air) or "sea-rid"
let currentMode = 'sea';
let pltCount = 1;
let lastLoadedGroupName = '';

// ── MONDAY ──────────────────────────────────────────────────────
async function mondayQuery(q) {
  const r = await fetch('https://api.monday.com/v2', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':API_TOKEN,'API-Version':'2024-01'},
    body:JSON.stringify({query:q})
  });
  return r.json();
}
function setStatus(msg,type='') {
  const el=document.getElementById('status-msg');
  el.textContent=msg; el.className='status-msg'+(type?' '+type:'');
}
async function loadGroups() {
  setStatus('Loading groups from Monday.com...');
  try {
    const d = await mondayQuery(`{boards(ids:${BOARD_ID}){groups{id title}}}`);
    const groups = d?.data?.boards?.[0]?.groups;
    if (!groups?.length) { setStatus('No groups found.','error'); return; }
    const sel = document.getElementById('group-select');
    sel.innerHTML = '<option value="">— Choose a group —</option>';
    groups.forEach(g => { const o=document.createElement('option'); o.value=g.id; o.textContent=g.title; sel.appendChild(o); });
    document.getElementById('load-btn').disabled = false;
    setStatus(`${groups.length} groups loaded.`,'success');
  } catch(e) { setStatus('Could not connect to Monday.com.','error'); }
}
async function loadGroup() {
  const sel = document.getElementById('group-select');
  const gid = sel.value, gname = sel.options[sel.selectedIndex]?.text;
  if (!gid) { setStatus('Please select a group first.','error'); return; }
  setStatus('Loading freight items...');
  document.getElementById('load-btn').disabled = true;
  try {
    const d = await mondayQuery(`{boards(ids:${BOARD_ID}){groups(ids:"${gid}"){items_page(limit:200){items{name column_values{id text column{title}}}}}}}`);
    const items = d?.data?.boards?.[0]?.groups?.[0]?.items_page?.items;
    if (!items?.length) { setStatus('No items found.','error'); document.getElementById('load-btn').disabled=false; return; }
    clearRows();
    items.forEach(item => {
      const cols={}, byId={};
      item.column_values.forEach(cv => { if(cv.column?.title) cols[cv.column.title.toLowerCase().trim()]=cv.text||''; byId[cv.id]=cv.text||''; });
      addRow({
        sender: item.name,
        id:     byId['item_id__1']||cols['internal id']||'',
        receiver: byId['text73__1']||cols['receiver']||cols['consignee']||'',
        loc:    cols['loc']||cols['location']||cols['bay']||'',
        pcs:    cols['pcs']||cols["pce's"]||cols['pieces']||cols['qty']||'',
        kg:     byId['numbers4__1']||cols['kg']||cols['weight']||'',
        breakdown: cols['piece breakdown']||cols['breakdown']||''
      });
    });
    document.getElementById('print-group-name').textContent = gname;
    lastLoadedGroupName = gname;
    saveState();
    setStatus(`✓ ${items.length} items loaded from "${gname}"`,'success');
    if (currentMode==='air') updateFooter();
  } catch(e) { setStatus('Error loading items.','error'); console.error(e); }
  document.getElementById('load-btn').disabled = false;
}

// ── CLEAR DETAILS ────────────────────────────────────────────────

// ── MODE ─────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-sea').classList.toggle('active', mode==='sea');

  document.getElementById('details-header').textContent = mode==='sea'?'Container Details':'Consignment Details';
  document.getElementById('plt-actions').style.display = mode==='air'?'flex':'none';
  document.getElementById('row-actions').style.display = mode==='air'?'none':'flex';

}

      <th class="center" style="width:60px">Lithium</th>
      <th class="center" style="width:60px">Loose</th>
      ${pltHeaderHTML(1)}`;
  }

function sortableHeader(label, colIndex, widthStyle, align='', type='text') {
  const combinedStyle = `cursor:pointer;user-select:none;${widthStyle||''}`;
  const cls = align ? `class="${align}"` : '';
  return `<th style="${combinedStyle}" ${cls} onclick="sortByColumn(${colIndex},'${type}')" data-sort-col="${colIndex}">
    <span style="display:inline-flex;align-items:center;gap:3px">${label}<span id="sort-arrow-${colIndex}" style="font-size:9px;opacity:0.5">⇕</span></span>
  </th>`;
}

let sortState = { col: null, asc: true };

function sortByColumn(colIndex, type) {
  const tbody = document.getElementById('freight-body');
  const rows = Array.from(tbody.querySelectorAll('tr[id^="row-"]'));
  if (rows.length === 0) return;

  // Toggle direction if same column clicked again
  if (sortState.col === colIndex) sortState.asc = !sortState.asc;
  else { sortState.col = colIndex; sortState.asc = true; }

  function getCellValue(row, idx) {
    // +1 because first <td> is the row number
    const cell = row.children[idx + 1];
    if (!cell) return '';
    const input = cell.querySelector('input');
    if (input) return input.value || '';
    return cell.textContent || '';
  }

  rows.sort((a, b) => {
    let va = getCellValue(a, colIndex);
    let vb = getCellValue(b, colIndex);
    if (type === 'num') {
      va = parseFloat(va) || 0;
      vb = parseFloat(vb) || 0;
      return sortState.asc ? va - vb : vb - va;
    }
    va = va.toString().toLowerCase();
    vb = vb.toString().toLowerCase();
    if (va < vb) return sortState.asc ? -1 : 1;
    if (va > vb) return sortState.asc ? 1 : -1;
    return 0;
  });

  rows.forEach(row => tbody.appendChild(row));

  // Update sort arrows
  document.querySelectorAll('[id^="sort-arrow-"]').forEach(el => { el.textContent='⇕'; el.style.opacity='0.5'; });
  const activeArrow = document.getElementById(`sort-arrow-${colIndex}`);
  if (activeArrow) { activeArrow.textContent = sortState.asc ? '▲' : '▼'; activeArrow.style.opacity = '1'; }

  saveState();
}

function pltHeaderHTML(p) {
  return `<th class="center" style="width:140px" id="plt-th-${p}"><div class="plt-label">PLT ${p}</div></th>`;
}

function renderTotalsBar() {
  const bar = document.getElementById('totals-bar');
  if (currentMode==='sea') {
    bar.innerHTML = `
      <div class="total-item"><span class="total-label">Total PCS</span><span class="total-value" id="total-pcs">0</span></div>
      <div class="total-item"><span class="total-label">Packed</span><span class="total-value" id="total-packed">0</span></div>
      <div class="total-item"><span class="total-label">Remaining</span><span class="total-value" id="total-remaining">0</span></div>
      <div class="progress-bar-wrap"><div class="progress-label">Pack Progress</div><div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div></div>`;
  } else {
    bar.innerHTML = `
      <div class="total-item"><span class="total-label">Total PCE's</span><span class="total-value" id="total-pcs">0</span></div>
      <div class="total-item"><span class="total-label">Total KG</span><span class="total-value" id="total-kg">0</span></div>
      <div class="total-item"><span class="total-label">Lithium Items</span><span class="total-value" id="total-lithium">0</span></div>
      <div class="total-item"><span class="total-label">Total Pallets</span><span class="total-value" id="total-pallets">0</span></div>
      <div class="total-item"><span class="total-label">Total Weight incl PLTs</span><span class="total-value" id="total-weight-with-plts">—</span></div>
      <div class="progress-bar-wrap"><div class="progress-label">Pallet Progress</div><div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div></div>`;
  }
}

// ── PLT FOOTER ───────────────────────────────────────────────────
function renderFooter() {
  if (currentMode==='sea') { document.getElementById('tfoot').innerHTML=''; return; }
  updateFooter();
}

function updateFooter() {
  if (currentMode==='sea') return;
  const tfoot = document.getElementById('tfoot');
  // Build tare row, total row, and PCE row
  let tareCells = `<td colspan="9" style="padding:6px 10px"><span class="plt-footer-label">PLT Tare Weight (kg)</span></td>`;
  let totalCells = `<td colspan="9" style="padding:6px 10px"><span class="plt-footer-label">PLT Total Weight (kg)</span></td>`;
  let pceCells = `<td colspan="9" style="padding:6px 10px"><span class="plt-footer-label">PLT Total PCE's</span></td>`;
  for (let p=1; p<=pltCount; p++) {
    const existingTare = document.getElementById(`tare-plt-${p}`)?.value || '';
    tareCells += `<td class="center plt-footer" style="padding:6px 8px">
      <div style="display:flex;align-items:center;justify-content:center;gap:3px">
        <input class="plt-tare-input" id="tare-plt-${p}" type="number" step="0.01" placeholder="0.00"
          value="${existingTare}" oninput="recalcPltTotal(${p}); updateTotals();" title="Enter empty pallet weight"
          style="width:55px">
        <span style="color:var(--sky);font-size:10px;font-weight:600">kg</span>
      </div>
    </td>`;
    const existingTotal = document.getElementById(`plt-total-input-${p}`)?.value || '';
    totalCells += `<td class="center plt-footer" style="padding:6px 8px">
      <div style="display:flex;align-items:center;justify-content:center;gap:3px">
        <input class="plt-tare-input" id="plt-total-input-${p}" type="number" step="0.01" placeholder="0.00"
          value="${existingTotal}" title="Enter gross pallet weight (freight + pallet)"
          oninput="updateTotals()" style="width:55px">
        <span style="color:var(--sky);font-size:10px;font-weight:600">kg</span>
      </div>
    </td>`;
    pceCells += `<td class="center plt-footer" style="padding:6px 8px">
      <div class="plt-total-val" id="plt-pce-${p}" style="color:white">—</div>
    </td>`;
  }
  tfoot.innerHTML = `
    <tr class="plt-footer">${tareCells}</tr>
    <tr class="plt-footer">${totalCells}</tr>
    <tr class="plt-footer">${pceCells}</tr>`;
  // Recalc all
  for (let p=1; p<=pltCount; p++) recalcPltTotal(p);
}

function recalcPltTotal(p) {
  // Sum PCE tallied to this PLT
  let pceTotal = 0;
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    pceTotal += tallyData[`${rid}-plt${p}`] || 0;
  });
  const pceEl = document.getElementById(`plt-pce-${p}`);
  if (pceEl) pceEl.textContent = pceTotal>0 ? pceTotal+' pcs' : '—';
}

// ── PLT ADD / REMOVE ─────────────────────────────────────────────
function addPltColumn() {
  pltCount++;
  const p = pltCount;
  const th = document.createElement('th');
  th.className='center'; th.style.width='140px'; th.id=`plt-th-${p}`;
  th.innerHTML = `<div class="plt-label">PLT ${p}</div>`;
  document.getElementById('thead-row').appendChild(th);
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    tallyData[`${rid}-plt${p}`] = 0;
    const td = document.createElement('td');
    td.className='center'; td.id=`plt-cell-${rid}-${p}`;
    td.innerHTML = buildAirTallyHTML(0, rid, p);
    row.appendChild(td);
  });
  updateFooter();
}

function removePltColumn() {
  if (pltCount<=1) { alert('There is only one PLT column — nothing to remove.'); return; }
  const choice = prompt(`Which PLT column do you want to remove?\n\nEnter a number from 1 to ${pltCount}:`, pltCount);
  if (choice === null) return;
  const num = parseInt(choice);
  if (isNaN(num) || num < 1 || num > pltCount) { alert('Please enter a valid PLT number.'); return; }
  const confirmed = confirm(`Remove PLT ${num}? Any tallies and tare weight entered for this pallet will be lost.`);
  if (!confirmed) return;

  // Remove the chosen header
  document.getElementById(`plt-th-${num}`)?.remove();
  // Remove the chosen cell from every row
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    document.getElementById(`plt-cell-${rid}-${num}`)?.remove();
    delete tallyData[`${rid}-plt${num}`];
  });

  // Renumber all PLT columns above the removed one (shift down by 1)
  for (let p = num + 1; p <= pltCount; p++) {
    const th = document.getElementById(`plt-th-${p}`);
    if (th) { th.id = `plt-th-${p-1}`; th.querySelector('.plt-label').textContent = `PLT ${p-1}`; }
    document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
      const rid = parseInt(row.id.replace('row-',''));
      const cell = document.getElementById(`plt-cell-${rid}-${p}`);
      if (cell) {
        cell.id = `plt-cell-${rid}-${p-1}`;
        tallyData[`${rid}-plt${p-1}`] = tallyData[`${rid}-plt${p}`] || 0;
        delete tallyData[`${rid}-plt${p}`];
        cell.innerHTML = buildAirTallyHTML(tallyData[`${rid}-plt${p-1}`], rid, p-1);
      }
    });
  }

  pltCount--;
  updateFooter();
  updateTotals();
  saveState();
}

// ── TALLY ────────────────────────────────────────────────────────
function tallyVisual(n) {
  let v='';
  const fives=Math.floor(n/5), rem=n%5;
  for(let i=0;i<fives;i++) v+='<span style="display:inline-block;margin-right:2px"><span style="text-decoration:line-through;letter-spacing:-1px">||||</span>|</span>';
  v+='|'.repeat(rem);
  return v;
}

function buildAirTallyHTML(n, rowId, pltNum) {
  return `<div class="tally-cell">
    <button class="tally-btn tally-minus" onclick="changeAirTally(${rowId},${pltNum},-1)">−</button>
    <div style="text-align:center">
      <div class="tally-marks" id="tm-${rowId}-${pltNum}">${tallyVisual(n)||'—'}</div>
      <div class="tally-count" id="tc-${rowId}-${pltNum}">${n>0?n+' pcs':''}</div>
    </div>
    <button class="tally-btn tally-plus" onclick="changeAirTally(${rowId},${pltNum},1)">+</button>
  </div>`;
}

function buildSeaTallyHTML(n, rowId) {
  return `<div class="tally-cell">
    <button class="tally-btn tally-minus" onclick="changeSeaTally(${rowId},-1)">−</button>
    <div style="text-align:center">
      <div class="tally-marks" id="stm-${rowId}">${tallyVisual(n)||'—'}</div>
      <div class="tally-count" id="stc-${rowId}">${n>0?n+' pcs':''}</div>
    </div>
    <button class="tally-btn tally-plus" onclick="changeSeaTally(${rowId},1)">+</button>
  </div>`;
}

function changeAirTally(rowId, pltNum, delta) {
  const key = `${rowId}-plt${pltNum}`;
  tallyData[key] = Math.max(0, (tallyData[key]||0)+delta);
  const n = tallyData[key];
  updateAirTallyDisplay(rowId, pltNum);
  checkAirRowDone(rowId);
  recalcPltTotal(pltNum);
  updateTotals();
}

function updateAirTallyDisplay(rowId, pltNum) {
  const n = tallyData[`${rowId}-plt${pltNum}`] || 0;
  const row = document.getElementById(`row-${rowId}`);
  const pcs = parseInt(row?.querySelector('.num-input')?.value) || 0;
  // Sum all PLT tallies for this row
  let totalTally = 0;
  for (let p=1; p<=pltCount; p++) totalTally += tallyData[`${rowId}-plt${p}`]||0;
  const rowDone = pcs > 0 && totalTally === pcs;
  const marksEl = document.getElementById(`tm-${rowId}-${pltNum}`);
  const countEl = document.getElementById(`tc-${rowId}-${pltNum}`);
  if (!marksEl || !countEl) return;
  if (rowDone && n > 0) {
    // Show number only when row is fully complete
    marksEl.innerHTML = `<span style="font-family:'Roboto Mono',monospace;font-size:15px;font-weight:700;color:var(--green)">${n}</span>`;
    countEl.textContent = '';
  } else {
    marksEl.innerHTML = tallyVisual(n) || '—';
    countEl.textContent = n>0 ? n+' pcs' : '';
  }
}

function changeSeaTally(rowId, delta) {
  const key = `sea-${rowId}`;
  tallyData[key] = Math.max(0, (tallyData[key]||0)+delta);
  updateSeaTallyDisplay(rowId);
  recheckSeaDone(rowId);
  updateTotals();
}

function updateSeaTallyDisplay(rowId) {
  const n = tallyData[`sea-${rowId}`] || 0;
  const target = getSeaTarget(rowId);
  const done = n > 0 && target > 0 && n === target;
  const marksEl = document.getElementById(`stm-${rowId}`);
  const countEl = document.getElementById(`stc-${rowId}`);
  if (!marksEl || !countEl) return;
  if (done) {
    marksEl.innerHTML = `<span style="font-family:'Roboto Mono',monospace;font-size:15px;font-weight:700;color:var(--green)">${n}</span>`;
    countEl.textContent = '';
  } else {
    marksEl.innerHTML = tallyVisual(n) || '—';
    countEl.textContent = n>0 ? n+' pcs' : '';
  }
}

function checkAirRowDone(rowId) {
  const row = document.getElementById(`row-${rowId}`);
  if (!row) return;
  const pcs = parseInt(row.querySelector('.num-input')?.value)||0;
  if (!pcs) { row.classList.remove('done-row','overpacked-row'); updateTotals(); return; }
  // Sum tallies across ALL PLTs for this row (supports split shipments)
  let totalTally = 0;
  for (let p=1; p<=pltCount; p++) totalTally += tallyData[`${rowId}-plt${p}`]||0;
  const overpacked = totalTally > pcs;
  const done = totalTally === pcs;
  row.classList.toggle('overpacked-row', overpacked);
  row.classList.toggle('done-row', done);
  // Refresh all PLT tally displays for this row (may switch to number or back to marks)
  for (let p=1; p<=pltCount; p++) updateAirTallyDisplay(rowId, p);
  updateTotals();
}

function getSeaTarget(rowId) {
  const row = document.getElementById(`row-${rowId}`);
  if (!row) return 0;
  const bd = row.querySelector('.breakdown-input')?.value?.trim()||'';
  if (bd) { const nums=bd.match(/\d+/g); if(nums?.length) return nums.reduce((a,b)=>a+parseInt(b),0); }
  return parseInt(row.querySelector('.num-input')?.value)||0;
}

function recheckSeaDone(rowId) {
  const row = document.getElementById(`row-${rowId}`);
  if (!row) return;
  const target = getSeaTarget(rowId);
  const n = tallyData[`sea-${rowId}`]||0;
  const overpacked = target>0 && n>target;
  row.classList.toggle('overpacked-row', overpacked);
  row.classList.toggle('done-row', n>0 && target>0 && n>=target && !overpacked);
  updateSeaTallyDisplay(rowId);
  updateTotals();
}

// ── ADD ROW ──────────────────────────────────────────────────────
function removeLastRow() {
  const tbody = document.getElementById('freight-body');
  const rows = tbody.querySelectorAll('tr[id^="row-"]');
  if (rows.length === 0) return;
  const lastRow = rows[rows.length - 1];
  const rid = parseInt(lastRow.id.replace('row-',''));
  lastRow.remove();
  // Clean up tally data for this row
  if (currentMode === 'sea') {
    delete tallyData[`sea-${rid}`];
  } else {
    for (let p=1; p<=pltCount; p++) delete tallyData[`${rid}-plt${p}`];
  }
  if (tbody.querySelectorAll('tr[id^="row-"]').length === 0) {
    tbody.innerHTML = `<tr><td colspan="12"><div class="empty-state"><div class="icon">📦</div>Select a group above and tap Load Freight</div></td></tr>`;
  }
  updateTotals();
  if (currentMode==='air') updateFooter();
}

function addRow(data={}) {
  rowCount++;
  const rid = rowCount;
  const tbody = document.getElementById('freight-body');
  // Clear empty state
  if (tbody.querySelector('.empty-state')) tbody.innerHTML='';
  const tr = document.createElement('tr');
  tr.id = `row-${rid}`;
  const kg = parseFloat(data.kg||0)||0;
  tr.dataset.freightkg = kg;

  if (currentMode==='sea') {
    tallyData[`sea-${rid}`] = 0;
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:11px;font-weight:600;text-align:center">${rid}</td>
      <td><input class="td-input" type="text" value="${data.sender||''}" placeholder="Shipment #"></td>
      <td><input class="td-input" type="text" value="${data.id||''}" placeholder="Internal ID" style="font-family:'Roboto Mono',monospace;font-size:11.5px;white-space:nowrap"></td>
      <td><input class="td-input" type="text" value="${data.receiver||''}" placeholder="Receiver"></td>
      <td><input class="td-input" type="text" value="${data.loc||''}" placeholder="e.g. D4"></td>
      <td><input class="num-input" type="number" min="0" value="${data.pcs||''}" placeholder="0" data-rid="${rid}" oninput="updateTotals();recheckSeaDone(parseInt(this.dataset.rid))"></td>
      <td><input class="td-input breakdown-input" type="text" value="${data.breakdown||''}" placeholder="e.g. 2 ctn, 1 plt" data-rid="${rid}" oninput="recheckSeaDone(parseInt(this.dataset.rid)); updateTotals()"></td>
      <td class="center"><div class="check-cell"><div class="check-box" onclick="this.classList.toggle('checked')"></div></div></td>
      <td class="center"><div class="check-cell"><div class="check-box" onclick="this.classList.toggle('checked')"></div></div></td>
      <td class="center">${buildSeaTallyHTML(0,rid)}</td>`;
  } else {
    for (let p=1; p<=pltCount; p++) tallyData[`${rid}-plt${p}`]=0;
    let pltCells='';
    for (let p=1; p<=pltCount; p++) {
      pltCells += `<td class="center" id="plt-cell-${rid}-${p}">${buildAirTallyHTML(0,rid,p)}</td>`;
    }
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:11px;font-weight:600;text-align:center">${rid}</td>
      <td><input class="td-input" type="text" value="${data.sender||''}" placeholder="Shipment #"></td>
      <td><input class="td-input" type="text" value="${data.id||''}" placeholder="Internal ID" style="font-family:'Roboto Mono',monospace;font-size:11.5px;white-space:nowrap"></td>
      <td><input class="td-input" type="text" value="${data.receiver||''}" placeholder="Receiver"></td>
      <td><input class="td-input" type="text" value="${data.loc||''}" placeholder="e.g. R4"></td>
      <td><input class="num-input" type="number" min="0" value="${data.pcs||''}" placeholder="0" data-rid="${rid}" oninput="updateTotals();checkAirRowDone(parseInt(this.dataset.rid))"></td>
      <td class="center" style="font-family:'Roboto Mono',monospace;font-size:12px;font-weight:600;color:var(--navy)">${kg>0?kg.toFixed(2):''}</td>
      <td class="center"><input class="td-input lithium-input" type="text" placeholder="—" style="text-align:center" oninput="updateTotals()"></td>
      <td class="center"><input class="td-input loose-input" type="text" placeholder="—" style="text-align:center" oninput="updateTotals()"></td>
      ${pltCells}`;
  }
  tbody.appendChild(tr);
  updateTotals();
  if (currentMode==='air') updateFooter();
}

// ── TOTALS ───────────────────────────────────────────────────────
function updateTotals() {
  let totalPcs=0, packedPcs=0, totalKg=0, totalTarget=0, lithiumCount=0;
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    const pcs = parseInt(row.querySelector('.num-input')?.value)||0;
    totalPcs += pcs;
    if (currentMode==='sea') {
      packedPcs += tallyData[`sea-${rid}`]||0;
      totalTarget += getSeaTarget(rid);
    } else {
      totalKg += parseFloat(row.dataset.freightkg||0)||0;
      const lithVal = row.querySelector('.lithium-input')?.value?.trim();
      const looseVal = row.querySelector('.loose-input')?.value?.trim();
      if (lithVal) {
        const n = parseInt(lithVal);
        lithiumCount += !isNaN(n) ? n : 1; // if it's a number, sum it; otherwise just count as 1 (e.g. "Y")
      }

    }
  });
  document.getElementById('total-pcs').textContent = totalPcs;
  if (currentMode==='sea') {
    document.getElementById('total-packed').textContent = packedPcs;
    document.getElementById('total-remaining').textContent = Math.max(0,totalTarget-packedPcs);
    const pct = totalTarget>0?Math.round((packedPcs/totalTarget)*100):0;
    const pfSea = document.getElementById('progress-fill');
    if (pfSea) { pfSea.style.width = Math.min(100,pct)+'%'; pfSea.style.background = pct>=100 ? 'var(--green)' : '#e74c3c'; }
  } else {
    const kgEl = document.getElementById('total-kg');
    if (kgEl) kgEl.textContent = totalKg.toFixed(2);
    const lithEl = document.getElementById('total-lithium');
    if (lithEl) lithEl.textContent = lithiumCount;
    // Count pallets with a gross weight entered, and sum them for total weight incl pallets
    let packedPltCount = 0, totalWeightWithPlts = 0;
    for (let p=1; p<=pltCount; p++) {
      const val = parseFloat(document.getElementById(`plt-total-input-${p}`)?.value) || 0;
      if (val > 0) { packedPltCount++; totalWeightWithPlts += val; }
    }
    const pltCountEl = document.getElementById('total-pallets');
    if (pltCountEl) pltCountEl.textContent = packedPltCount;
    const totalWEl = document.getElementById('total-weight-with-plts');
    if (totalWEl) totalWEl.textContent = totalWeightWithPlts > 0 ? totalWeightWithPlts.toFixed(2)+' kg' : '—';
    // Progress: rows done / total rows
    let done=0, total=0;
    document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
      total++;
      if (row.classList.contains('done-row')) done++;
    });
    const pct = total>0?Math.round((done/total)*100):0;
    const pfEl = document.getElementById('progress-fill');
    if (pfEl) { pfEl.style.width = Math.min(100,pct)+'%'; pfEl.style.background = pct>=100 ? 'var(--green)' : '#e74c3c'; }
  }
  updatePackCompletionState();
}

function isFullyPacked() {
  const rows = document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]');
  if (rows.length === 0) return false;
  let allDone = true;
  let anyOverpacked = false;
  rows.forEach(row => {
    if (row.classList.contains('overpacked-row')) anyOverpacked = true;
    if (!row.classList.contains('done-row')) allDone = false;
  });
  return allDone && !anyOverpacked;
}

function updatePackCompletionState() {
  const btn = document.getElementById('print-btn');
  if (!btn) return;
  const rows = document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]');
  if (rows.length === 0) { btn.disabled = false; btn.title=''; return; } // nothing loaded yet, don't block
  const ready = isFullyPacked();
  btn.disabled = !ready;
  btn.title = ready ? '' : 'All shipments must be fully (and correctly) packed before saving as PDF';
  btn.style.opacity = ready ? '1' : '0.45';
  btn.style.cursor = ready ? 'pointer' : 'not-allowed';
}

function clearRows() {
  document.getElementById('freight-body').innerHTML=`<tr><td colspan="12"><div class="empty-state"><div class="icon">📦</div>Select a group above and tap Load Freight</div></td></tr>`;
  document.getElementById('tfoot').innerHTML='';
  rowCount=0; tallyData={};
  updatePackCompletionState();
}

// ── SMART PRINT (auto-scale for many columns) ───────────────────
function autoResizeNotes(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight) + 'px';
}

function smartPrint() {
  // ── MANDATORY FIELD CHECK ──
  const missing = [];
  if (currentMode === 'sea') {
    const seaFields = [
      { id: 'f-consol',   label: 'Consol #' },
      { id: 'f-dest',     label: 'Destination' },
      { id: 'f-cont',     label: 'Container #' },
      { id: 'f-size',     label: 'Container Size' },
      { id: 'f-seal',     label: 'Seal #' },
      { id: 'f-tare',     label: 'Tare Weight' },
      { id: 'f-date',     label: 'Date Packed' },
      { id: 'f-packedby', label: 'Packed By' },
    ];
    seaFields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el?.value?.trim()) missing.push(f.label);
    });
  } else {
    const airFields = [
      { id: 'f-consol',   label: 'Consol #' },
      { id: 'f-dest',     label: 'Destination' },
      { id: 'f-date',     label: 'Date' },
      { id: 'f-packedby', label: 'Packed By' },
    ];
    airFields.forEach(f => {
      const el = document.getElementById(f.id);
      if (!el?.value?.trim()) missing.push(f.label);
    });
    // Check PLT tare and total weight fields
    for (let p = 1; p <= pltCount; p++) {
      const tare = document.getElementById(`tare-plt-${p}`)?.value?.trim();
      const total = document.getElementById(`plt-total-input-${p}`)?.value?.trim();
      if (!tare) missing.push(`PLT ${p} Tare Weight`);
      if (!total) missing.push(`PLT ${p} Total Weight`);
    }
  }
  if (missing.length > 0) {
    // Highlight missing fields in red
    document.querySelectorAll('.field-input').forEach(el => el.style.borderBottomColor = '');
    missing.forEach(label => {
      const allFields = document.querySelectorAll('.field-input');
      allFields.forEach(el => {
        const labelEl = el.closest('.field-group')?.querySelector('.field-label');
        if (labelEl?.textContent?.trim() === label) {
          el.style.borderBottomColor = '#e74c3c';
        }
      });
    });
    alert('Please complete the following mandatory fields before saving:\n\n\u2022 ' + missing.join('\n\u2022 '));
    return;
  }
  // Clear any red highlights if all fields are filled
  document.querySelectorAll('.field-input').forEach(el => el.style.borderBottomColor = '');

  // ── PACKING COMPLETION CHECK ──
  const rows = document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]');
  if (rows.length > 0 && !isFullyPacked()) {
    let overpackedCount = 0, incompleteCount = 0;
    rows.forEach(row => {
      if (row.classList.contains('overpacked-row')) overpackedCount++;
      else if (!row.classList.contains('done-row')) incompleteCount++;
    });
    let msg = 'You can\'t save as PDF yet:\n\n';
    if (overpackedCount > 0) msg += `• ${overpackedCount} shipment(s) are OVER-packed (shown in red) — fix these first.\n`;
    if (incompleteCount > 0) msg += `• ${incompleteCount} shipment(s) are not fully packed yet.\n`;
    msg += '\nAll lines must be fully and correctly packed (green) before saving.';
    alert(msg);
    return;
  }
  document.body.classList.remove('print-scale-1','print-scale-2','print-scale-3','print-scale-4','print-scale-5');
  const notesEl = document.getElementById('notes-textarea');
  if (notesEl) autoResizeNotes(notesEl);
  if (currentMode === 'air') {
    if (pltCount >= 8) document.body.classList.add('print-scale-5');
    else if (pltCount >= 6) document.body.classList.add('print-scale-4');
    else if (pltCount >= 4) document.body.classList.add('print-scale-3');
    else if (pltCount >= 3) document.body.classList.add('print-scale-2');
    else if (pltCount >= 2) document.body.classList.add('print-scale-1');
  }
  window.print();
}

// ── TAB SYSTEM ──────────────────────────────────────────────────
const TABS_KEY = 'pac_pack_tabs_v1';
let tabs = [];
let activeTabId = null;
let tabCounter = 0;

function collectState() {
  const detailFields = {};
  document.getElementById('details-grid').querySelectorAll('.field-input').forEach(input => {
    detailFields[input.id] = input.value;
  });
  return {
    mode: currentMode,
    pltCount: pltCount,
    rowCount: rowCount,
    tallyData: tallyData,
    detailFields: detailFields,
    notes: document.querySelector('.notes-area')?.value || '',
    freightBodyHTML: document.getElementById('freight-body').innerHTML,
    tfootHTML: document.getElementById('tfoot').innerHTML,
    theadHTML: document.getElementById('thead-row').innerHTML,
    groupName: lastLoadedGroupName,
    savedAt: new Date().toISOString(),
    pltWeights: (()=>{
      const w={};
      for(let p=1;p<=pltCount;p++){
        w[`tare-${p}`]=document.getElementById(`tare-plt-${p}`)?.value||'';
        w[`total-${p}`]=document.getElementById(`plt-total-input-${p}`)?.value||'';
      }
      return w;
    })()
  };
}

function restoreState(state) {
  currentMode = state.mode || 'sea';
  pltCount = state.pltCount || 1;
  rowCount = state.rowCount || 0;
  tallyData = state.tallyData || {};

  document.getElementById('btn-sea').classList.toggle('active', currentMode==='sea');
  document.getElementById('btn-air').classList.toggle('active', currentMode==='air');
  document.getElementById('mode-subtitle').textContent = currentMode==='sea'?'Container Pack Checklist':'Air Freight Pack Checklist';
  document.getElementById('print-title').textContent = currentMode==='sea'?'Container Pack Checklist':'Air Freight Pack Checklist';
  document.getElementById('details-header').textContent = currentMode==='sea'?'Container Details':'Consignment Details';
  document.getElementById('plt-actions').style.display = currentMode==='air'?'flex':'none';
  document.getElementById('row-actions').style.display = currentMode==='air'?'none':'flex';

  renderDetailsGrid();
  Object.keys(state.detailFields||{}).forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = state.detailFields[id];
  });
  const notesEl = document.querySelector('.notes-area');
  if (notesEl) { notesEl.value = state.notes || ''; autoResizeNotes(notesEl); }

  renderTableHeaders(); // always rebuild fresh — pltCount already restored above
  // Add extra PLT columns beyond 1 that were saved
  for (let p = 2; p <= pltCount; p++) {
    const th = document.createElement('th');
    th.className='center'; th.style.width='140px'; th.id=`plt-th-${p}`;
    th.innerHTML = `<div class="plt-label">PLT ${p}</div>`;
    document.getElementById('thead-row').appendChild(th);
  }
  document.getElementById('freight-body').innerHTML = state.freightBodyHTML || `<tr><td colspan="12"><div class="empty-state"><div class="icon">📦</div>Select a group above and tap Load Freight</div></td></tr>`;
  document.getElementById('tfoot').innerHTML = state.tfootHTML || '';

  lastLoadedGroupName = state.groupName || '';
  document.getElementById('print-group-name').textContent = lastLoadedGroupName;

  updateTotals();
  if (currentMode==='air') {
    updateFooter();
    // Restore PLT weight values after footer is rebuilt
    const pw = state.pltWeights || {};
    Object.keys(pw).forEach(k => {
      const match = k.match(/^(tare|total)-(\d+)$/);
      if (!match) return;
      const id = match[1]==='tare' ? `tare-plt-${match[2]}` : `plt-total-input-${match[2]}`;
      const el = document.getElementById(id);
      if (el && pw[k]) el.value = pw[k];
    });
  }
  renderTotalsBar();
  updateTotals();
}


function tabsKey() { return TABS_KEY; }

function saveTabs() {
  try { localStorage.setItem(TABS_KEY, JSON.stringify({ tabs, activeTabId })); } catch(e) {}
}

function loadTabsFromStorage() {
  try {
    const raw = localStorage.getItem(TABS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function generateTabId() { return 'tab_' + Date.now() + '_' + (++tabCounter); }

function getTabLabel() {
  const consolEl = document.getElementById('f-consol');
  const val = consolEl?.value?.trim();
  return val || 'New Pack';
}

function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  tabs.forEach(tab => {
    const item = document.createElement('div');
    item.className = 'tab-item' + (tab.id === activeTabId ? ' active' : '');
    item.dataset.tabId = tab.id;

    // Status dot
    const dot = document.createElement('span');
    dot.className = 'tab-dot';
    const s = tab.state;
    const hasRows = s?.freightBodyHTML && !s.freightBodyHTML.includes('empty-state');
    if (!hasRows) dot.classList.add('empty');
    item.appendChild(dot);

    // Label
    const lbl = document.createElement('span');
    lbl.textContent = tab.label || 'New Pack';
    item.appendChild(lbl);

    // Close button
    const cls = document.createElement('span');
    cls.className = 'tab-close';
    cls.textContent = '×';
    cls.onclick = (e) => { e.stopPropagation(); closeTab(tab.id); };
    item.appendChild(cls);

    item.onclick = () => switchTab(tab.id);
    bar.appendChild(item);
  });

  // Add new tab button
  const addBtn = document.createElement('button');
  addBtn.className = 'tab-add';
  addBtn.textContent = '+';
  addBtn.title = 'New pack';
  addBtn.onclick = addTab;
  bar.appendChild(addBtn);
}

function saveCurrentTab() {
  if (!activeTabId) return;
  const tab = tabs.find(t => t.id === activeTabId);
  if (!tab) return;
  tab.state = collectState();
  tab.label = getTabLabel();
  saveTabs();
}

function addTab() {
  saveCurrentTab();
  const id = generateTabId();
  tabs.push({ id, label: 'New Pack', state: null });
  activeTabId = id;
  saveTabs();
  // Reset UI to blank
  setMode('sea');
  clearRows();
  renderDetailsGrid();
  document.querySelector('.notes-area').value = '';
  document.getElementById('status-msg').textContent = '';
  renderTabBar();
  updatePackCompletionState();
}

function switchTab(id) {
  if (id === activeTabId) return;
  saveCurrentTab();
  activeTabId = id;
  saveTabs();
  const tab = tabs.find(t => t.id === id);
  if (tab?.state) {
    restoreState(tab.state);
  } else {
    setMode('sea');
    clearRows();
    renderDetailsGrid();
    document.querySelector('.notes-area').value = '';
  }
  renderTabBar();
}

function closeTab(id) {
  const tab = tabs.find(t => t.id === id);
  const label = tab?.label || 'this pack';
  if (!confirm(`Close "${label}"?\n\nThis pack will be removed and cannot be recovered.`)) return;
  const idx = tabs.findIndex(t => t.id === id);
  tabs.splice(idx, 1);
  if (tabs.length === 0) {
    // Always keep at least one tab
    const newId = generateTabId();
    tabs.push({ id: newId, label: 'New Pack', state: null });
    activeTabId = newId;
    setMode('sea');
    clearRows();
    renderDetailsGrid();
    document.querySelector('.notes-area').value = '';
  } else {
    // Switch to adjacent tab
    const newIdx = Math.min(idx, tabs.length - 1);
    activeTabId = tabs[newIdx].id;
    const newTab = tabs[newIdx];
    if (newTab.state) restoreState(newTab.state);
    else { setMode('sea'); clearRows(); renderDetailsGrid(); document.querySelector('.notes-area').value = ''; }
  }
  saveTabs();
  renderTabBar();
}

// Update tab label live as Consol # is typed
function onConsolInput() {
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) {
    tab.label = getTabLabel();
    renderTabBar();
  }
}

// ── AUTOSAVE ────────────────────────────────────────────────────
function saveState() {
  saveCurrentTab();
  const ind = document.getElementById('autosave-indicator');
  if (ind) {
    ind.textContent = '✓ Saved';
    clearTimeout(window._autosaveIndTimeout);
    window._autosaveIndTimeout = setTimeout(() => { if(ind) ind.textContent=''; }, 1500);
  }
}

function manualSave() {
  try {
    saveState();
    const btn = document.getElementById('backup-btn');
    const original = btn.textContent;
    btn.textContent = '✓ Saved!';
    btn.style.background = 'var(--green)';
    btn.style.borderColor = 'var(--green)';
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = 'transparent';
      btn.style.borderColor = 'rgba(255,255,255,0.4)';
    }, 1500);
  } catch(e) {
    alert('Could not save — your device storage may be full.');
  }
}

function clearDetails() {
  const confirmed = confirm('Are you sure you want to clear all details?\n\nThis will reset everything and start a fresh pack on this tab.');
  if (!confirmed) return;
  const tab = tabs.find(t => t.id === activeTabId);
  if (tab) { tab.state = null; tab.label = 'New Pack'; }
  setMode('sea');
  clearRows();
  renderDetailsGrid();
  document.querySelector('.notes-area').value = '';
  saveTabs();
  renderTabBar();
}

function initTabs() {
  const saved = loadTabsFromStorage();
  if (saved && saved.tabs && saved.tabs.length > 0) {
    tabs = saved.tabs;
    activeTabId = saved.activeTabId || tabs[0].id;
    // Restore active tab
    const activeTab = tabs.find(t => t.id === activeTabId);
    if (activeTab?.state) {
      restoreState(activeTab.state);
    } else {
      setMode('sea');
    }
  } else {
    // Fresh start — create first tab
    const id = generateTabId();
    tabs = [{ id, label: 'New Pack', state: null }];
    activeTabId = id;
    setMode('sea');
    saveTabs();
  }
  renderTabBar();

  // Attach autosave listeners
  const container = document.querySelector('.container');
  let saveTimeout = null;
  function scheduleSave() {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(saveState, 400);
  }
  container.addEventListener('input', scheduleSave);
  container.addEventListener('click', scheduleSave);
}



// ── INIT ─────────────────────────────────────────────────────────
setMode('sea');
loadGroups();
initTabs();

</script>
