<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAC Pack Checklist</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap');
  :root { --navy:#1B3172; --sky:#29ABE2; --yellow:#F5C518; --light:#F4F7FB; --border:#D0DCF0; --text:#1a1a2e; --muted:#6b7a99; --green:#2ecc71; --row-alt:#f0f5fb; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Inter',sans-serif; background:var(--light); color:var(--text); min-height:100vh; }

  @media screen {
    .screen-header { background:var(--navy); padding:16px 24px; display:flex; align-items:center; justify-content:space-between; gap:16px; }
    .logo-area { display:flex; align-items:center; gap:12px; }
    .logo-box { background:var(--sky); color:white; font-weight:700; font-size:13px; letter-spacing:1.5px; padding:6px 10px; border-radius:4px; }
    .logo-title { color:white; font-size:15px; font-weight:600; }
    .logo-sub { color:var(--sky); font-size:11px; font-weight:500; letter-spacing:0.5px; text-transform:uppercase; }
    .header-right { display:flex; align-items:center; gap:12px; }
    .mode-toggle { display:flex; border-radius:8px; overflow:hidden; border:2px solid rgba(255,255,255,0.2); }
    .mode-btn { padding:8px 18px; font-size:13px; font-weight:700; cursor:pointer; border:none; background:transparent; color:rgba(255,255,255,0.6); transition:all 0.2s; }
    .mode-btn.active { background:var(--yellow); color:var(--navy); }
    .save-btn { background:var(--yellow); color:var(--navy); border:none; padding:10px 20px; border-radius:6px; font-weight:700; font-size:13px; cursor:pointer; }
    .save-btn:hover { opacity:0.85; }
    .clear-btn { background:#e74c3c; color:white; border:none; padding:10px 18px; border-radius:6px; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.2s; letter-spacing:0.3px; box-shadow:0 2px 8px rgba(231,76,60,0.5); }
    .clear-btn:hover { background:#c0392b; box-shadow:0 2px 12px rgba(231,76,60,0.7); }
    .container { max-width:1200px; margin:24px auto; padding:0 16px 40px; }
    .card { background:white; border-radius:10px; border:1px solid var(--border); overflow:hidden; margin-bottom:20px; }
    .card-header { background:var(--navy); color:white; padding:14px 20px; font-weight:600; font-size:13px; letter-spacing:0.5px; text-transform:uppercase; }
    .group-bar { display:flex; align-items:center; gap:12px; padding:14px 18px; flex-wrap:wrap; }
    .group-label { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; white-space:nowrap; }
    .group-select { flex:1; min-width:200px; border:2px solid var(--border); border-radius:6px; padding:8px 12px; font-size:14px; font-weight:500; color:var(--text); background:white; outline:none; cursor:pointer; }
    .group-select:focus { border-color:var(--sky); }
    .load-btn { background:var(--sky); color:white; border:none; padding:9px 18px; border-radius:6px; font-weight:600; font-size:13px; cursor:pointer; white-space:nowrap; }
    .load-btn:hover { opacity:0.85; }
    .load-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .status-msg { font-size:12px; color:var(--muted); padding:0 18px 12px; min-height:20px; }
    .status-msg.error { color:#e74c3c; }
    .status-msg.success { color:var(--green); }
    .fields-grid { display:grid; grid-template-columns:1fr 1fr 1fr; }
    .field-group { padding:14px 18px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
    .field-group:nth-child(3n) { border-right:none; }
    .field-label { font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
    .field-input { width:100%; border:none; border-bottom:2px solid var(--border); padding:4px 0; font-size:14px; font-family:'Roboto Mono',monospace; font-weight:500; color:var(--text); background:transparent; outline:none; transition:border-color 0.15s; }
    .field-input:focus { border-bottom-color:var(--sky); }
    .table-scroll { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    thead tr { background:var(--navy); color:white; }
    thead th { padding:8px 10px; text-align:left; font-size:11px; font-weight:600; letter-spacing:0.5px; text-transform:uppercase; white-space:nowrap; vertical-align:top; }
    thead th.center { text-align:center; }
    tbody tr { border-bottom:1px solid var(--border); }
    tbody tr:nth-child(even) { background:var(--row-alt); }
    tbody tr:hover { background:#e8f0fb; }
    tbody tr.done-row { background:#e8f8f0 !important; }
    tbody td { padding:7px 10px; vertical-align:middle; }
    tbody td.center { text-align:center; vertical-align:middle; }
    .td-input { width:100%; border:none; background:transparent; font-size:13px; color:var(--text); outline:none; padding:2px 0; }
    .td-input:focus { border-bottom:1.5px solid var(--sky); }
    .num-input { width:48px; border:none; background:transparent; font-family:'Roboto Mono',monospace; font-size:13px; font-weight:500; color:var(--text); outline:none; text-align:center; }
    .num-input:focus { border-bottom:1.5px solid var(--sky); }
    .check-cell { display:flex; justify-content:center; align-items:center; }
    .check-box { width:20px; height:20px; border:2px solid var(--border); border-radius:4px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .check-box.checked { background:var(--green); border-color:var(--green); }
    .check-box.checked::after { content:'✓'; color:white; font-size:12px; font-weight:700; }
    /* TALLY */
    .tally-cell { display:flex; align-items:center; gap:4px; justify-content:center; }
    .tally-marks { font-size:14px; min-width:38px; text-align:center; line-height:1; color:var(--navy); font-family:'Roboto Mono',monospace; }
    .tally-count { font-size:10px; color:var(--muted); font-weight:600; text-align:center; }
    .tally-btn { width:22px; height:22px; border-radius:50%; border:none; cursor:pointer; font-size:13px; font-weight:700; display:flex; align-items:center; justify-content:center; transition:all 0.15s; flex-shrink:0; }
    .tally-plus { background:var(--sky); color:white; }
    .tally-plus:hover { background:var(--navy); }
    .tally-minus { background:#eee; color:var(--muted); }
    .tally-minus:hover { background:#ddd; }
    /* PLT header */
    .plt-label { background:rgba(255,255,255,0.15); border-radius:4px; padding:3px 6px; font-size:11px; font-weight:700; letter-spacing:0.5px; text-align:center; margin-bottom:4px; }
    /* PLT footer rows */
    .plt-footer { background:#1a2d65; }
    .plt-footer td { padding:6px 10px; font-size:11px; }
    .plt-footer-label { color:var(--sky); font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
    .plt-tare-input { width:70px; border:none; border-bottom:1.5px solid rgba(255,255,255,0.3); background:transparent; color:white; font-family:'Roboto Mono',monospace; font-size:12px; font-weight:600; text-align:center; outline:none; padding:2px 4px; }
    .plt-tare-input::placeholder { color:rgba(255,255,255,0.3); }
    .plt-total-val { color:var(--yellow); font-family:'Roboto Mono',monospace; font-weight:700; font-size:13px; text-align:center; }
    /* Add/remove PLT */
    .plt-actions { display:flex; gap:8px; padding:10px 18px 0; justify-content:flex-end; }
    .add-plt-btn { background:transparent; border:2px solid var(--sky); color:var(--sky); padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.15s; }
    .add-plt-btn:hover { background:var(--sky); color:white; }
    .rem-plt-btn { background:transparent; border:2px solid #e74c3c; color:#e74c3c; padding:6px 14px; border-radius:6px; cursor:pointer; font-size:12px; font-weight:600; transition:all 0.15s; }
    .rem-plt-btn:hover { background:#e74c3c; color:white; }
    .add-row-btn { margin:12px 18px; background:transparent; border:2px dashed var(--border); color:var(--muted); padding:8px 18px; border-radius:6px; cursor:pointer; font-size:13px; font-weight:500; transition:all 0.15s; width:calc(100% - 36px); }
    .add-row-btn:hover { border-color:var(--sky); color:var(--sky); }
    .totals-bar { display:flex; gap:24px; padding:14px 20px; background:var(--navy); color:white; align-items:center; flex-wrap:wrap; }
    .total-item { display:flex; gap:8px; align-items:center; }
    .total-label { color:var(--sky); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.5px; }
    .total-value { font-family:'Roboto Mono',monospace; font-weight:700; font-size:16px; }
    .progress-bar-wrap { flex:1; min-width:120px; }
    .progress-bar-bg { background:rgba(255,255,255,0.2); border-radius:99px; height:6px; overflow:hidden; }
    .progress-bar-fill { background:var(--yellow); height:100%; border-radius:99px; transition:width 0.3s; }
    .progress-label { font-size:11px; color:var(--sky); margin-bottom:4px; font-weight:600; text-transform:uppercase; }
    .notes-area { width:100%; border:none; padding:14px 18px; font-size:13px; color:var(--text); resize:vertical; min-height:70px; outline:none; background:white; }
    .print-tip { text-align:center; color:var(--muted); font-size:12px; margin-top:8px; }
    .empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
    .empty-state .icon { font-size:32px; margin-bottom:10px; }
  }

  @media print {
    body { background:white; font-size:10px; }
    .screen-header,.save-btn,.add-row-btn,.plt-actions,.print-tip,.group-bar,.status-msg,.tally-btn { display:none !important; }
    .container { max-width:100%; padding:0; margin:0; }
    .print-header { display:flex !important; align-items:center; justify-content:space-between; border-bottom:3px solid #1B3172; padding-bottom:10px; margin-bottom:14px; }
    .print-logo { font-size:20px; font-weight:800; color:#1B3172; }
    .print-logo span { color:#29ABE2; }
    .print-title { font-size:12px; font-weight:700; color:#1B3172; text-align:right; }
    .print-subtitle { font-size:10px; color:#6b7a99; }
    .card { border:1px solid #ccc; margin-bottom:10px; border-radius:4px; overflow:hidden; }
    .card-header { background:#1B3172 !important; color:white !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; padding:5px 10px; font-size:9px; font-weight:700; text-transform:uppercase; }
    .fields-grid { display:grid; grid-template-columns:1fr 1fr 1fr; }
    .field-group { padding:7px 10px; border-right:1px solid #ccc; border-bottom:1px solid #ccc; }
    .field-label { font-size:8px; font-weight:700; color:#6b7a99; text-transform:uppercase; margin-bottom:2px; }
    .field-input { font-size:11px; font-weight:600; border:none; border-bottom:1px solid #ccc; width:100%; padding:2px 0; }
    table { width:100%; border-collapse:collapse; font-size:9px; }
    thead tr { background:#1B3172 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    thead th { color:white !important; padding:5px 6px; font-size:8px; font-weight:700; text-transform:uppercase; text-align:left; vertical-align:top; }
    thead th.center { text-align:center; }
    tbody tr { border-bottom:1px solid #ddd; }
    tbody tr:nth-child(even) { background:#f5f8fc !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    tbody tr.done-row { background:#e8f8f0 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    tbody td { padding:4px 6px; }
    tbody td.center { text-align:center; }
    .td-input,.num-input { border:none; background:transparent; font-size:9px; width:100%; }
    .check-box { width:12px; height:12px; border:1.5px solid #999; border-radius:2px; display:inline-flex; align-items:center; justify-content:center; margin:0 auto; }
    .check-box.checked { background:#2ecc71 !important; border-color:#2ecc71 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .check-box.checked::after { content:'✓'; color:white; font-size:8px; font-weight:700; }
    .check-cell { display:flex; justify-content:center; }
    .tally-cell { display:flex; align-items:center; justify-content:center; gap:2px; }
    .tally-marks { font-size:10px; color:#1B3172; font-family:monospace; }
    .tally-count { font-size:8px; color:#6b7a99; font-weight:700; }
    .plt-footer { background:#1a2d65 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
    .plt-footer td { padding:4px 6px; }
    .plt-footer-label { color:#29ABE2 !important; font-size:8px; font-weight:700; text-transform:uppercase; }
    .plt-tare-input { color:white !important; font-size:9px; background:transparent; border:none; border-bottom:1px solid rgba(255,255,255,0.4); text-align:center; width:50px; }
    .plt-total-val { color:#F5C518 !important; font-size:10px; font-weight:700; text-align:center; }
    .plt-label { background:rgba(255,255,255,0.15) !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; font-size:9px; font-weight:700; text-align:center; padding:2px 4px; border-radius:3px; }
    .totals-bar { display:flex; gap:16px; padding:6px 10px; background:#1B3172 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; color:white !important; }
    .total-label { color:#29ABE2 !important; font-size:8px; font-weight:700; text-transform:uppercase; }
    .total-value { font-weight:700; font-size:12px; }
    .progress-bar-wrap { display:none; }
    .notes-area { padding:7px 10px; font-size:9px; min-height:30px; border:none; }
    .empty-state { display:none; }
  }
  .print-header { display:none; }
</style>
</head>
<body>

<div class="screen-header">
  <div class="logo-area">
    <div class="logo-box">PAC</div>
    <div>
      <div class="logo-title">Pacific Air Cargo</div>
      <div class="logo-sub" id="mode-subtitle">Pack Checklist</div>
    </div>
  </div>
  <div class="header-right">
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-sea" onclick="setMode('sea')">🚢 SEA</button>
      <button class="mode-btn" id="btn-air" onclick="setMode('air')">✈️ AIR</button>
    </div>
    <button class="clear-btn" onclick="clearDetails()">✕ Clear Details</button>
    <button class="save-btn" onclick="window.print()">⬇ Save as PDF</button>
  </div>
</div>

<div class="container">
  <div class="print-header">
    <div class="print-logo">PACIFIC <span>AIR CARGO</span></div>
    <div>
      <div class="print-title" id="print-title">Pack Checklist</div>
      <div class="print-subtitle" id="print-group-name"></div>
    </div>
  </div>

  <!-- GROUP SELECTOR -->
  <div class="card">
    <div class="card-header">Select Monday.com Group</div>
    <div class="group-bar">
      <span class="group-label">Group</span>
      <select class="group-select" id="group-select"><option value="">Loading groups...</option></select>
      <button class="load-btn" id="load-btn" onclick="loadGroup()" disabled>Load Freight</button>
    </div>
    <div class="status-msg" id="status-msg"></div>
  </div>

  <!-- DETAILS -->
  <div class="card">
    <div class="card-header" id="details-header">Container Details</div>
    <div class="fields-grid" id="details-grid"></div>
  </div>

  <!-- FREIGHT TABLE -->
  <div class="card">
    <div class="card-header">Freight Items</div>
    <div class="plt-actions" id="plt-actions" style="display:none">
      <button class="rem-plt-btn" onclick="removePltColumn()">− Remove PLT</button>
      <button class="add-plt-btn" onclick="addPltColumn()">+ Add PLT</button>
    </div>
    <div class="table-scroll">
      <table id="freight-table">
        <thead><tr id="thead-row"></tr></thead>
        <tbody id="freight-body">
          <tr><td colspan="12"><div class="empty-state"><div class="icon">📦</div>Select a group above and tap Load Freight</div></td></tr>
        </tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>
    <div id="row-actions" style="display:flex;gap:8px;margin:12px 18px;align-items:center;justify-content:space-between">
      <button class="add-row-btn" id="add-row-btn" onclick="addRow()" style="margin:0;flex:1">+ Add Row</button>
      <button class="add-row-btn" id="remove-row-btn" onclick="removeLastRow()" style="margin:0;border-color:#e74c3c;color:#e74c3c;flex:0 0 auto;padding:4px 10px;font-size:11px">− Remove Row</button>
    </div>
    <div class="totals-bar" id="totals-bar"></div>
  </div>

  <div class="card">
    <div class="card-header">Notes</div>
    <textarea class="notes-area" placeholder="Any additional notes..."></textarea>
  </div>
  <div class="print-tip">Tap "Save as PDF" → Save to Files or Print from the share sheet</div>
</div>

<script>
const API_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJ0aWQiOjY1NTA2MjcxMCwiYWFpIjoxMSwidWlkIjo0Mjk5NTY4OSwiaWFkIjoiMjAyNi0wNS0wN1QwMzozMDo0Ny4wMDBaIiwicGVyIjoibWU6d3JpdGUiLCJhY3RpZCI6MTY2NzY4OTQsInJnbiI6InVzZTEifQ.Aju0mNGNOKtHfSNkYp_uL4_zVuHMXVIZ6JHdWClEwPQ';
const BOARD_ID = '6964153366';
let rowCount = 0;
let tallyData = {};   // key: "rid-pltN" (air) or "sea-rid"
let currentMode = 'sea';
let pltCount = 1;

// ── MONDAY ──────────────────────────────────────────────────────
async function mondayQuery(q) {
  const r = await fetch('https://api.monday.com/v2', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':API_TOKEN,'API-Version':'2024-01'},
    body:JSON.stringify({query:q})
  });
  return r.json();
}
function setStatus(msg,type='') {
  const el=document.getElementById('status-msg');
  el.textContent=msg; el.className='status-msg'+(type?' '+type:'');
}
async function loadGroups() {
  setStatus('Loading groups from Monday.com...');
  try {
    const d = await mondayQuery(`{boards(ids:${BOARD_ID}){groups{id title}}}`);
    const groups = d?.data?.boards?.[0]?.groups;
    if (!groups?.length) { setStatus('No groups found.','error'); return; }
    const sel = document.getElementById('group-select');
    sel.innerHTML = '<option value="">— Choose a group —</option>';
    groups.forEach(g => { const o=document.createElement('option'); o.value=g.id; o.textContent=g.title; sel.appendChild(o); });
    document.getElementById('load-btn').disabled = false;
    setStatus(`${groups.length} groups loaded.`,'success');
  } catch(e) { setStatus('Could not connect to Monday.com.','error'); }
}
async function loadGroup() {
  const sel = document.getElementById('group-select');
  const gid = sel.value, gname = sel.options[sel.selectedIndex]?.text;
  if (!gid) { setStatus('Please select a group first.','error'); return; }
  setStatus('Loading freight items...');
  document.getElementById('load-btn').disabled = true;
  try {
    const d = await mondayQuery(`{boards(ids:${BOARD_ID}){groups(ids:"${gid}"){items_page(limit:200){items{name column_values{id text column{title}}}}}}}`);
    const items = d?.data?.boards?.[0]?.groups?.[0]?.items_page?.items;
    if (!items?.length) { setStatus('No items found.','error'); document.getElementById('load-btn').disabled=false; return; }
    clearRows();
    items.forEach(item => {
      const cols={}, byId={};
      item.column_values.forEach(cv => { if(cv.column?.title) cols[cv.column.title.toLowerCase().trim()]=cv.text||''; byId[cv.id]=cv.text||''; });
      addRow({
        sender: item.name,
        id:     byId['item_id__1']||cols['internal id']||'',
        receiver: byId['text73__1']||cols['receiver']||cols['consignee']||'',
        loc:    cols['loc']||cols['location']||cols['bay']||'',
        pcs:    cols['pcs']||cols["pce's"]||cols['pieces']||cols['qty']||'',
        kg:     byId['numbers4__1']||cols['kg']||cols['weight']||'',
        breakdown: cols['piece breakdown']||cols['breakdown']||''
      });
    });
    document.getElementById('print-group-name').textContent = gname;
    setStatus(`✓ ${items.length} items loaded from "${gname}"`,'success');
    if (currentMode==='air') updateFooter();
  } catch(e) { setStatus('Error loading items.','error'); console.error(e); }
  document.getElementById('load-btn').disabled = false;
}

// ── CLEAR DETAILS ────────────────────────────────────────────────
function clearDetails() {
  document.getElementById('details-grid').querySelectorAll('.field-input').forEach(input => {
    // Keep date field re-populated with today
    if (input.id === 'f-date') {
      input.value = new Date().toLocaleDateString('en-AU');
    } else {
      input.value = '';
    }
  });
}

// ── MODE ─────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-sea').classList.toggle('active', mode==='sea');
  document.getElementById('btn-air').classList.toggle('active', mode==='air');
  document.getElementById('mode-subtitle').textContent = mode==='sea'?'Container Pack Checklist':'Air Freight Pack Checklist';
  document.getElementById('print-title').textContent = mode==='sea'?'Container Pack Checklist':'Air Freight Pack Checklist';
  document.getElementById('details-header').textContent = mode==='sea'?'Container Details':'Consignment Details';
  document.getElementById('plt-actions').style.display = mode==='air'?'flex':'none';
  document.getElementById('row-actions').style.display = mode==='air'?'none':'flex';
  pltCount = 1;
  renderDetailsGrid(); renderTableHeaders(); clearRows(); renderTotalsBar(); renderFooter();
}

function renderDetailsGrid() {
  const g = document.getElementById('details-grid');
  if (currentMode==='sea') {
    g.innerHTML = `
      <div class="field-group"><div class="field-label">Consol #</div><input class="field-input" id="f-consol" type="text" placeholder="e.g. BNESYD00123"></div>
      <div class="field-group"><div class="field-label">Destination</div><input class="field-input" id="f-dest" type="text" placeholder="e.g. POM"></div>
      <div class="field-group"><div class="field-label">Container #</div><input class="field-input" id="f-cont" type="text" placeholder="e.g. TCKU1234567"></div>
      <div class="field-group"><div class="field-label">Container Size</div><input class="field-input" id="f-size" type="text" placeholder="e.g. 20FT"></div>
      <div class="field-group"><div class="field-label">Seal #</div><input class="field-input" id="f-seal" type="text" placeholder="Seal number"></div>
      <div class="field-group"><div class="field-label">Tare Weight</div><input class="field-input" id="f-tare" type="text" placeholder="kg"></div>
      <div class="field-group"><div class="field-label">Date Packed</div><input class="field-input" id="f-date" type="text" value="${new Date().toLocaleDateString('en-AU')}"></div>
      <div class="field-group"><div class="field-label">Packed By</div><input class="field-input" id="f-packedby" type="text" placeholder="Name"></div>
      <div class="field-group"><div class="field-label">Supervised By</div><input class="field-input" id="f-supervisedby" type="text" placeholder="Name"></div>`;
  } else {
    g.innerHTML = `
      <div class="field-group"><div class="field-label">Consol #</div><input class="field-input" id="f-consol" type="text" placeholder="e.g. BNESYD00123"></div>
      <div class="field-group"><div class="field-label">Destination</div><input class="field-input" id="f-dest" type="text" placeholder="e.g. POM"></div>
      <div class="field-group"><div class="field-label">Date</div><input class="field-input" id="f-date" type="text" value="${new Date().toLocaleDateString('en-AU')}"></div>
      <div class="field-group"><div class="field-label">Packed By</div><input class="field-input" id="f-packedby" type="text" placeholder="Name"></div>`;
  }
}

function renderTableHeaders() {
  const tr = document.getElementById('thead-row');
  pltCount = 1;
  if (currentMode==='sea') {
    tr.innerHTML = `
      <th style="width:32px">#</th><th style="min-width:90px">Shipment #</th><th style="min-width:110px">Internal ID</th><th style="min-width:90px">Receiver</th>
      <th>Location</th><th class="center" style="width:50px">PCS</th>
      <th>Piece Breakdown</th><th class="center" style="width:60px">Stickered</th>
      <th class="center" style="width:130px">Packed</th>`;
  } else {
    tr.innerHTML = `
      <th style="width:32px">#</th><th style="min-width:90px">Shipment #</th><th style="min-width:110px">Internal ID</th><th style="min-width:90px">Receiver</th>
      <th>Location</th><th class="center" style="width:50px">PCE's</th>
      <th class="center" style="width:65px">KG</th>
      <th class="center" style="width:60px">Lithium</th>
      <th class="center" style="width:60px">Loose</th>
      ${pltHeaderHTML(1)}`;
  }
}

function pltHeaderHTML(p) {
  return `<th class="center" style="width:140px" id="plt-th-${p}"><div class="plt-label">PLT ${p}</div></th>`;
}

function renderTotalsBar() {
  const bar = document.getElementById('totals-bar');
  if (currentMode==='sea') {
    bar.innerHTML = `
      <div class="total-item"><span class="total-label">Total PCS</span><span class="total-value" id="total-pcs">0</span></div>
      <div class="total-item"><span class="total-label">Packed</span><span class="total-value" id="total-packed">0</span></div>
      <div class="total-item"><span class="total-label">Remaining</span><span class="total-value" id="total-remaining">0</span></div>
      <div class="progress-bar-wrap"><div class="progress-label">Pack Progress</div><div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div></div>`;
  } else {
    bar.innerHTML = `
      <div class="total-item"><span class="total-label">Total PCE's</span><span class="total-value" id="total-pcs">0</span></div>
      <div class="total-item"><span class="total-label">Total KG</span><span class="total-value" id="total-kg">0</span></div>
      <div class="progress-bar-wrap"><div class="progress-label">Pallet Progress</div><div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div></div>`;
  }
}

// ── PLT FOOTER ───────────────────────────────────────────────────
function renderFooter() {
  if (currentMode==='sea') { document.getElementById('tfoot').innerHTML=''; return; }
  updateFooter();
}

function updateFooter() {
  if (currentMode==='sea') return;
  const tfoot = document.getElementById('tfoot');
  // Build tare row and total row
  let tareCells = `<td colspan="9" style="padding:6px 10px"><span class="plt-footer-label">PLT Tare Weight (kg)</span></td>`;
  let totalCells = `<td colspan="9" style="padding:6px 10px"><span class="plt-footer-label">PLT Total Weight (kg)</span></td>`;
  for (let p=1; p<=pltCount; p++) {
    const existingTare = document.getElementById(`tare-plt-${p}`)?.value || '';
    tareCells += `<td class="center plt-footer" style="padding:6px 8px">
      <input class="plt-tare-input" id="tare-plt-${p}" type="number" step="0.01" placeholder="0.00 kg"
        value="${existingTare}" oninput="recalcPltTotal(${p})" title="Enter empty pallet weight">
    </td>`;
    totalCells += `<td class="center plt-footer" style="padding:6px 8px">
      <div class="plt-total-val" id="plt-total-${p}">—</div>
    </td>`;
  }
  tfoot.innerHTML = `
    <tr class="plt-footer">${tareCells}</tr>
    <tr class="plt-footer">${totalCells}</tr>`;
  // Recalc all
  for (let p=1; p<=pltCount; p++) recalcPltTotal(p);
}

function recalcPltTotal(p) {
  // Sum KG of rows where tally for this PLT >= that row's PCE count
  let freightTotal = 0;
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    const pcs = parseInt(row.querySelector('.num-input')?.value) || 0;
    const tally = tallyData[`${rid}-plt${p}`] || 0;
    const kg = parseFloat(row.dataset.freightkg || 0) || 0;
    if (pcs > 0 && tally >= pcs) freightTotal += kg;
  });
  const tare = parseFloat(document.getElementById(`tare-plt-${p}`)?.value) || 0;
  const total = freightTotal + tare;
  const el = document.getElementById(`plt-total-${p}`);
  if (el) el.textContent = (freightTotal || tare) ? total.toFixed(2)+' kg' : '—';
}

// ── PLT ADD / REMOVE ─────────────────────────────────────────────
function addPltColumn() {
  pltCount++;
  const p = pltCount;
  const th = document.createElement('th');
  th.className='center'; th.style.width='140px'; th.id=`plt-th-${p}`;
  th.innerHTML = `<div class="plt-label">PLT ${p}</div>`;
  document.getElementById('thead-row').appendChild(th);
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    tallyData[`${rid}-plt${p}`] = 0;
    const td = document.createElement('td');
    td.className='center'; td.id=`plt-cell-${rid}-${p}`;
    td.innerHTML = buildAirTallyHTML(0, rid, p);
    row.appendChild(td);
  });
  updateFooter();
}

function removePltColumn() {
  if (pltCount<=1) return;
  document.getElementById(`plt-th-${pltCount}`)?.remove();
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    document.getElementById(`plt-cell-${rid}-${pltCount}`)?.remove();
    delete tallyData[`${rid}-plt${pltCount}`];
  });
  pltCount--;
  updateFooter();
  updateTotals();
}

// ── TALLY ────────────────────────────────────────────────────────
function tallyVisual(n) {
  let v='';
  const fives=Math.floor(n/5), rem=n%5;
  for(let i=0;i<fives;i++) v+='<span style="display:inline-block;margin-right:2px"><span style="text-decoration:line-through;letter-spacing:-1px">||||</span>|</span>';
  v+='|'.repeat(rem);
  return v;
}

function buildAirTallyHTML(n, rowId, pltNum) {
  return `<div class="tally-cell">
    <button class="tally-btn tally-minus" onclick="changeAirTally(${rowId},${pltNum},-1)">−</button>
    <div style="text-align:center">
      <div class="tally-marks" id="tm-${rowId}-${pltNum}">${tallyVisual(n)||'—'}</div>
      <div class="tally-count" id="tc-${rowId}-${pltNum}">${n>0?n+' pcs':''}</div>
    </div>
    <button class="tally-btn tally-plus" onclick="changeAirTally(${rowId},${pltNum},1)">+</button>
  </div>`;
}

function buildSeaTallyHTML(n, rowId) {
  return `<div class="tally-cell">
    <button class="tally-btn tally-minus" onclick="changeSeaTally(${rowId},-1)">−</button>
    <div style="text-align:center">
      <div class="tally-marks" id="stm-${rowId}">${tallyVisual(n)||'—'}</div>
      <div class="tally-count" id="stc-${rowId}">${n>0?n+' pcs':''}</div>
    </div>
    <button class="tally-btn tally-plus" onclick="changeSeaTally(${rowId},1)">+</button>
  </div>`;
}

function changeAirTally(rowId, pltNum, delta) {
  const key = `${rowId}-plt${pltNum}`;
  tallyData[key] = Math.max(0, (tallyData[key]||0)+delta);
  const n = tallyData[key];
  document.getElementById(`tm-${rowId}-${pltNum}`).innerHTML = tallyVisual(n)||'—';
  document.getElementById(`tc-${rowId}-${pltNum}`).textContent = n>0?n+' pcs':'';
  checkAirRowDone(rowId);
  recalcPltTotal(pltNum);
  updateTotals();
}

function changeSeaTally(rowId, delta) {
  const key = `sea-${rowId}`;
  tallyData[key] = Math.max(0, (tallyData[key]||0)+delta);
  const n = tallyData[key];
  document.getElementById(`stm-${rowId}`).innerHTML = tallyVisual(n)||'—';
  document.getElementById(`stc-${rowId}`).textContent = n>0?n+' pcs':'';
  recheckSeaDone(rowId);
  updateTotals();
}

function checkAirRowDone(rowId) {
  const row = document.getElementById(`row-${rowId}`);
  if (!row) return;
  const pcs = parseInt(row.querySelector('.num-input')?.value)||0;
  if (!pcs) { row.classList.remove('done-row'); return; }
  let done = false;
  for (let p=1; p<=pltCount; p++) {
    if ((tallyData[`${rowId}-plt${p}`]||0) >= pcs) { done=true; break; }
  }
  row.classList.toggle('done-row', done);
}

function getSeaTarget(rowId) {
  const row = document.getElementById(`row-${rowId}`);
  if (!row) return 0;
  const bd = row.querySelector('.breakdown-input')?.value?.trim()||'';
  if (bd) { const nums=bd.match(/\d+/g); if(nums?.length) return nums.reduce((a,b)=>a+parseInt(b),0); }
  return parseInt(row.querySelector('.num-input')?.value)||0;
}

function recheckSeaDone(rowId) {
  const row = document.getElementById(`row-${rowId}`);
  if (!row) return;
  const target = getSeaTarget(rowId);
  const n = tallyData[`sea-${rowId}`]||0;
  row.classList.toggle('done-row', n>0 && target>0 && n>=target);
}

// ── ADD ROW ──────────────────────────────────────────────────────
function removeLastRow() {
  const tbody = document.getElementById('freight-body');
  const rows = tbody.querySelectorAll('tr[id^="row-"]');
  if (rows.length === 0) return;
  const lastRow = rows[rows.length - 1];
  const rid = parseInt(lastRow.id.replace('row-',''));
  lastRow.remove();
  // Clean up tally data for this row
  if (currentMode === 'sea') {
    delete tallyData[`sea-${rid}`];
  } else {
    for (let p=1; p<=pltCount; p++) delete tallyData[`${rid}-plt${p}`];
  }
  if (tbody.querySelectorAll('tr[id^="row-"]').length === 0) {
    tbody.innerHTML = `<tr><td colspan="12"><div class="empty-state"><div class="icon">📦</div>Select a group above and tap Load Freight</div></td></tr>`;
  }
  updateTotals();
  if (currentMode==='air') updateFooter();
}

function addRow(data={}) {
  rowCount++;
  const rid = rowCount;
  const tbody = document.getElementById('freight-body');
  // Clear empty state
  if (tbody.querySelector('.empty-state')) tbody.innerHTML='';
  const tr = document.createElement('tr');
  tr.id = `row-${rid}`;
  const kg = parseFloat(data.kg||0)||0;
  tr.dataset.freightkg = kg;

  if (currentMode==='sea') {
    tallyData[`sea-${rid}`] = 0;
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:11px;font-weight:600;text-align:center">${rid}</td>
      <td><input class="td-input" type="text" value="${data.sender||''}" placeholder="Shipment #"></td>
      <td><input class="td-input" type="text" value="${data.id||''}" placeholder="Internal ID" style="font-family:'Roboto Mono',monospace;font-size:11.5px;white-space:nowrap"></td>
      <td><input class="td-input" type="text" value="${data.receiver||''}" placeholder="Receiver"></td>
      <td><input class="td-input" type="text" value="${data.loc||''}" placeholder="e.g. D4"></td>
      <td><input class="num-input" type="number" min="0" value="${data.pcs||''}" placeholder="0" data-rid="${rid}" oninput="updateTotals();recheckSeaDone(parseInt(this.dataset.rid))"></td>
      <td><input class="td-input breakdown-input" type="text" value="${data.breakdown||''}" placeholder="e.g. 2 ctn, 1 plt" data-rid="${rid}" oninput="recheckSeaDone(parseInt(this.dataset.rid)); updateTotals()"></td>
      <td class="center"><div class="check-cell"><div class="check-box" onclick="this.classList.toggle('checked')"></div></div></td>
      <td class="center">${buildSeaTallyHTML(0,rid)}</td>`;
  } else {
    for (let p=1; p<=pltCount; p++) tallyData[`${rid}-plt${p}`]=0;
    let pltCells='';
    for (let p=1; p<=pltCount; p++) {
      pltCells += `<td class="center" id="plt-cell-${rid}-${p}">${buildAirTallyHTML(0,rid,p)}</td>`;
    }
    tr.innerHTML = `
      <td style="color:var(--muted);font-size:11px;font-weight:600;text-align:center">${rid}</td>
      <td><input class="td-input" type="text" value="${data.sender||''}" placeholder="Shipment #"></td>
      <td><input class="td-input" type="text" value="${data.id||''}" placeholder="Internal ID" style="font-family:'Roboto Mono',monospace;font-size:11.5px;white-space:nowrap"></td>
      <td><input class="td-input" type="text" value="${data.receiver||''}" placeholder="Receiver"></td>
      <td><input class="td-input" type="text" value="${data.loc||''}" placeholder="e.g. R4"></td>
      <td><input class="num-input" type="number" min="0" value="${data.pcs||''}" placeholder="0" data-rid="${rid}" oninput="updateTotals();checkAirRowDone(parseInt(this.dataset.rid))"></td>
      <td class="center" style="font-family:'Roboto Mono',monospace;font-size:12px;font-weight:600;color:var(--navy)">${kg>0?kg.toFixed(2):''}</td>
      <td class="center"><div class="check-cell"><div class="check-box" onclick="this.classList.toggle('checked')"></div></div></td>
      <td class="center"><div class="check-cell"><div class="check-box" onclick="this.classList.toggle('checked')"></div></div></td>
      ${pltCells}`;
  }
  tbody.appendChild(tr);
  updateTotals();
  if (currentMode==='air') updateFooter();
}

// ── TOTALS ───────────────────────────────────────────────────────
function updateTotals() {
  let totalPcs=0, packedPcs=0, totalKg=0, totalTarget=0;
  document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
    const rid = parseInt(row.id.replace('row-',''));
    const pcs = parseInt(row.querySelector('.num-input')?.value)||0;
    totalPcs += pcs;
    if (currentMode==='sea') {
      packedPcs += tallyData[`sea-${rid}`]||0;
      totalTarget += getSeaTarget(rid);
    } else totalKg += parseFloat(row.dataset.freightkg||0)||0;
  });
  document.getElementById('total-pcs').textContent = totalPcs;
  if (currentMode==='sea') {
    document.getElementById('total-packed').textContent = packedPcs;
    document.getElementById('total-remaining').textContent = Math.max(0,totalTarget-packedPcs);
    const pct = totalTarget>0?Math.round((packedPcs/totalTarget)*100):0;
    document.getElementById('progress-fill').style.width = Math.min(100,pct)+'%';
  } else {
    const kgEl = document.getElementById('total-kg');
    if (kgEl) kgEl.textContent = totalKg.toFixed(2);
    // Progress: rows done / total rows
    let done=0, total=0;
    document.getElementById('freight-body').querySelectorAll('tr[id^="row-"]').forEach(row => {
      total++;
      if (row.classList.contains('done-row')) done++;
    });
    const pct = total>0?Math.round((done/total)*100):0;
    const pfEl = document.getElementById('progress-fill');
    if (pfEl) pfEl.style.width = Math.min(100,pct)+'%';
  }
}

function clearRows() {
  document.getElementById('freight-body').innerHTML=`<tr><td colspan="12"><div class="empty-state"><div class="icon">📦</div>Select a group above and tap Load Freight</div></td></tr>`;
  document.getElementById('tfoot').innerHTML='';
  rowCount=0; tallyData={};
}

// ── INIT ─────────────────────────────────────────────────────────
setMode('sea');
loadGroups();
</script>
</body>
